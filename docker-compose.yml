services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/db/zz-set-passwords.sh:/docker-entrypoint-initdb.d/zz-set-passwords.sh:ro

  # ── GoTrue — auth service ─────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.151.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_MAILER_AUTOCONFIRM: "true"

  # ── PostgREST — REST API over PostgreSQL ──────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  # ── Storage API ───────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v0.46.4
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - ./data/storage:/var/lib/storage

  # ── Kong — API gateway (routes /auth, /rest, /storage) ───────────────────
  kong:
    image: kong:2.8.1
    entrypoint: ["/home/kong/kong-start.sh"]
    ports:
      - "8000:8000"
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/api/kong.yml:/home/kong/kong.yml:ro
      - ./docker/api/kong-start.sh:/home/kong/kong-start.sh:ro

  # ── DB migrations — run app schema once after auth is up ─────────────────
  db-migrations:
    image: postgres:15-alpine
    depends_on:
      auth:
        condition: service_healthy
    volumes:
      - ./supabase-schema.sql:/app/schema.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: db
      PGUSER: postgres
      PGDATABASE: postgres
    entrypoint: ["sh", "-c", "psql -f /app/schema.sql; exit 0"]
    restart: "no"

  # ── Next.js app ───────────────────────────────────────────────────────────
  qrmenu:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_INTERNAL_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - kong
      - db-migrations
    restart: unless-stopped

# Data is stored in ./data/postgres and ./data/storage (bind mounts, not Docker volumes)
# This ensures data survives Docker restarts, crashes, and Docker Desktop resets.
